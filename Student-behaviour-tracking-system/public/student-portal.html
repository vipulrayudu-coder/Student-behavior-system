<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Student Portal - Incident Manager</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fb; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .card-animate { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-animate:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-background text-on-surface">
    <!-- TopNavBar -->
    <header class="flex justify-between items-center h-16 px-8 sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="flex items-center gap-4">
            <span class="text-xl font-bold text-blue-800">Student Portal</span>
            <a href="Incident report.html" class="ml-4 px-4 py-2 bg-primary/10 text-primary hover:bg-primary hover:text-white rounded-lg font-semibold text-sm transition-colors flex items-center gap-2 border border-primary/20">
                <span class="material-symbols-outlined text-[18px]">add_circle</span>
                Report Incident
            </a>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex flex-col items-end">
                <span id="userName" class="text-sm font-semibold">Loading...</span>
                <span id="userRole" class="text-[10px] text-slate-500 uppercase tracking-wider">Student</span>
            </div>
            <button id="logoutBtn" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-600">
                <span class="material-symbols-outlined">logout</span>
            </button>
        </div>
    </header>

    <main class="p-8 max-w-6xl mx-auto">
        <div class="mb-10">
            <h1 class="text-3xl font-bold text-slate-800">My Incident History</h1>
            <p class="text-slate-600 mt-2">View all behavioral records reported under your profile.</p>
        </div>

        <div id="noIncidents" class="hidden bg-white border border-slate-200 rounded-2xl p-12 text-center">
            <div class="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="material-symbols-outlined text-4xl">check_circle</span>
            </div>
            <h3 class="text-xl font-bold text-slate-800">All Clear!</h3>
            <p class="text-slate-600 mt-2">No incidents have been reported for you.</p>
        </div>

        <div id="incidentsList" class="space-y-6">
            <!-- Incidents will be injected here -->
        </div>
    </main>

    <script>
        // Performance Helpers - Cached Date/Time Formatters
        const dateFormatter = new Intl.DateTimeFormat(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
        const timeFormatter = new Intl.DateTimeFormat(undefined, { hour: '2-digit', minute: '2-digit' });

        const user = JSON.parse(localStorage.getItem('user'));
        const token = localStorage.getItem('token');

        if (!user || !token) {
            window.location.href = 'login.html';
        }

        document.getElementById('userName').innerText = user.name;
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'login.html';
        });

        async function loadIncidents() {
            try {
                const response = await fetch('/api/incidents', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const incidents = await response.json();

                if (incidents.length === 0) {
                    document.getElementById('noIncidents').classList.remove('hidden');
                    return;
                }

                const container = document.getElementById('incidentsList');
                container.innerHTML = incidents.map(incident => `
                    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm card-animate flex gap-6">
                        <div class="flex-shrink-0 w-16 h-16 rounded-2xl flex items-center justify-center ${getSeverityClass(incident.severity)}">
                            <span class="material-symbols-outlined text-3xl">${getIcon(incident.type)}</span>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h3 class="text-xl font-bold text-slate-800">${incident.type}</h3>
                                    <p class="text-xs text-slate-400 mt-0.5">ID: #INC-${incident.id.slice(-6)}</p>
                                </div>
                                <div class="text-right">
                                    <span class="text-sm font-semibold text-slate-900">${dateFormatter.format(new Date(incident.date))}</span>
                                    <p class="text-[10px] text-slate-400 uppercase tracking-tighter">${timeFormatter.format(new Date(incident.date))}</p>
                                </div>
                            </div>
                            <div class="bg-slate-50 rounded-xl p-4 border border-slate-100 my-4">
                                <p class="text-slate-700 text-sm leading-relaxed">${incident.description}</p>
                            </div>
                            <div class="flex items-center justify-between mt-4">
                                <div class="flex items-center gap-3">
                                    <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${getSeverityTagClass(incident.severity)}">
                                        ${incident.severity} Severity
                                    </span>
                                    <span class="text-[11px] text-slate-400 font-medium">Location: <span class="text-slate-600">${incident.location || 'N/A'}</span></span>
                                </div>
                                <span class="text-[11px] text-slate-400 font-medium">Reported by: ${incident.reportedBy}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                alert('Failed to load incidents');
            }
        }

        function getSeverityClass(severity) {
            if (!severity) return 'bg-blue-50 text-blue-500';
            switch(severity.toLowerCase()) {
                case 'high':
                case 'critical': return 'bg-red-50 text-red-500';
                case 'medium':
                case 'major': return 'bg-orange-50 text-orange-500';
                default: return 'bg-blue-50 text-blue-500';
            }
        }

        function getSeverityTagClass(severity) {
            if (!severity) return 'bg-blue-100 text-blue-700';
            switch(severity.toLowerCase()) {
                case 'high':
                case 'critical': return 'bg-red-100 text-red-700';
                case 'medium':
                case 'major': return 'bg-orange-100 text-orange-700';
                default: return 'bg-blue-100 text-blue-700';
            }
        }

        function getIcon(type) {
            const t = (type || '').toLowerCase();
            if (t.includes('behavior')) return 'psychology';
            if (t.includes('academic')) return 'menu_book';
            if (t.includes('safety')) return 'health_and_safety';
            if (t.includes('attendance')) return 'event_busy';
            return 'info';
        }

        loadIncidents();
    </script>
</body>
</html>
