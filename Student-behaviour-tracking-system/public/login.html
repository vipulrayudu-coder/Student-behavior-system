<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Incident Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .bg-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .input-focus { transition: all 0.3s ease; }
        .input-focus:focus { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1); }
        
        /* Spinner */
        .loader { width: 20px; height: 20px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6 relative">
    <!-- Animated Background Circles -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-600/20 blur-[120px] animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-600/20 blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>

    <div class="glass w-full max-w-md p-10 rounded-3xl shadow-2xl z-10 animate__animated animate__fadeInUp">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg shadow-blue-600/30 mb-4 transform -rotate-6">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Portal Access</h1>
            <p class="text-slate-500 mt-2 font-medium">Student Behaviour Management System</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Email Address</label>
                <input id="email" type="email" required class="input-focus w-full px-5 py-4 rounded-2xl bg-white border border-slate-100 text-slate-800 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all" placeholder="admin@school.com">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Password</label>
                <input id="password" type="password" required class="input-focus w-full px-5 py-4 rounded-2xl bg-white border border-slate-100 text-slate-800 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all" placeholder="••••••••">
            </div>
            
            <div id="errorMessage" class="hidden text-red-500 text-sm font-medium bg-red-50 p-3 rounded-xl border border-red-100 animate__animated animate__shakeX">
                Invalid credentials. Please try again.
            </div>

            <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-xl shadow-blue-600/20 active:scale-95 flex items-center justify-center gap-3">
                <span id="btnText">Sign In</span>
                <span id="btnLoader" class="loader hidden"></span>
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-slate-200/50 text-center">
            <p class="text-slate-500 text-sm font-medium">Secured by SchoolGuard Infrastructure</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const btn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const errorMsg = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Start Loading
            btn.disabled = true;
            btnText.innerText = 'Verifying...';
            btnLoader.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Smooth Redirect
                    btnText.innerText = 'Success! Redirecting...';
                    btn.classList.replace('bg-blue-600', 'bg-green-500');
                    
                    setTimeout(() => {
                        window.location.href = data.user.role === 'admin' ? 'Dashboard.html' : 'student-portal.html';
                    }, 800);
                } else {
                    errorMsg.innerText = data.message || 'Login failed';
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btnText.innerText = 'Sign In';
                    btnLoader.classList.add('hidden');
                }
            } catch (err) {
                errorMsg.innerText = 'Network error. Please try again later.';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btnText.innerText = 'Sign In';
                btnLoader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
